<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Регистрация — Учусь.РФ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toast" id="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastText">Сообщение</span>
    </div>

    <div class="page-center">
        <div class="logo-container">
            <img src="images/etazhi-logotip-vektor-48.jpg" alt="Учусь.РФ" class="logo-img">
            <div class="brand-name">Учусь.РФ</div>
            <div class="brand-subtitle">Запись на онлайн-курсы</div>
        </div>

        <div class="form-card">
            <h1 class="form-title">Регистрация</h1>

            <form id="registerForm">
                <div class="input-group">
                    <label class="input-label">ФИО</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="fullName" placeholder="Иванов Иван Иванович">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="error-hint" id="fullNameError">
                        <i class="fas fa-exclamation-circle hint-icon"></i>
                        <span>Введите полное ФИО</span>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Логин</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="login" placeholder="min 6 символов, латиница и цифры">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="error-hint" id="loginError">
                        <i class="fas fa-exclamation-circle hint-icon"></i>
                        <span>Минимум 6 символов, только латиница и цифры</span>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Пароль</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="Минимум 8 символов">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="password-strength" id="passwordStrength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="error-hint" id="passwordError">
                        <i class="fas fa-exclamation-circle hint-icon"></i>
                        <span>Пароль должен содержать минимум 8 символов</span>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Телефон</label>
                    <div class="input-wrapper">
                        <input type="tel" class="form-input" id="phone" placeholder="+7 (999) 999-99-99">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="error-hint" id="phoneError">
                        <i class="fas fa-exclamation-circle hint-icon"></i>
                        <span>Введите корректный номер телефона</span>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">E-mail</label>
                    <div class="input-wrapper">
                        <input type="email" class="form-input" id="email" placeholder="example@mail.ru">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="error-hint" id="emailError">
                        <i class="fas fa-exclamation-circle hint-icon"></i>
                        <span>Введите корректный e-mail</span>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-user-plus" style="margin-right: 8px;"></i>Создать аккаунт
                </button>
            </form>

            <div class="link-text">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const inputs = {
            fullName: document.getElementById('fullName'),
            login: document.getElementById('login'),
            password: document.getElementById('password'),
            phone: document.getElementById('phone'),
            email: document.getElementById('email')
        };
        const errors = {
            fullName: document.getElementById('fullNameError'),
            login: document.getElementById('loginError'),
            password: document.getElementById('passwordError'),
            phone: document.getElementById('phoneError'),
            email: document.getElementById('emailError')
        };

        function showError(field, show) {
            if (show) {
                inputs[field].classList.add('error');
                errors[field].classList.add('visible');
            } else {
                inputs[field].classList.remove('error');
                errors[field].classList.remove('visible');
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.textContent = message;
            toast.className = 'toast ' + type;
            toast.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        inputs.phone.addEventListener('input', function(e) {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 0) {
                if (val[0] === '7' || val[0] === '8') val = val.substring(1);
                let formatted = '+7';
                if (val.length > 0) formatted += ' (' + val.substring(0, 3);
                if (val.length >= 3) formatted += ') ' + val.substring(3, 6);
                if (val.length >= 6) formatted += '-' + val.substring(6, 8);
                if (val.length >= 8) formatted += '-' + val.substring(8, 10);
                e.target.value = formatted;
            }
        });

        inputs.password.addEventListener('input', function() {
            const val = this.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthDiv = document.getElementById('passwordStrength');
            if (val.length > 0) {
                strengthDiv.classList.add('visible');
                strengthBar.className = 'password-strength-bar';
                if (val.length < 6) strengthBar.classList.add('strength-weak');
                else if (val.length < 10) strengthBar.classList.add('strength-medium');
                else strengthBar.classList.add('strength-strong');
            } else {
                strengthDiv.classList.remove('visible');
            }
        });

        inputs.login.addEventListener('blur', function() {
            const regex = /^[a-zA-Z0-9]{6,}$/;
            showError('login', this.value && !regex.test(this.value));
        });
        inputs.password.addEventListener('blur', function() {
            showError('password', this.value && this.value.length < 8);
        });
        inputs.email.addEventListener('blur', function() {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            showError('email', this.value && !regex.test(this.value));
        });
        inputs.fullName.addEventListener('blur', function() {
            showError('fullName', this.value && this.value.trim().split(' ').length < 2);
        });
        inputs.phone.addEventListener('blur', function() {
            const digits = this.value.replace(/\D/g, '');
            showError('phone', this.value && digits.length < 11);
        });

        Object.keys(inputs).forEach(key => {
            inputs[key].addEventListener('input', () => showError(key, false));
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            let valid = true;

            if (!inputs.fullName.value.trim() || inputs.fullName.value.trim().split(' ').length < 2) {
                showError('fullName', true); valid = false;
            }
            const loginRegex = /^[a-zA-Z0-9]{6,}$/;
            if (!loginRegex.test(inputs.login.value)) {
                showError('login', true); valid = false;
            }
            if (inputs.password.value.length < 8) {
                showError('password', true); valid = false;
            }
            const phoneDigits = inputs.phone.value.replace(/\D/g, '');
            if (phoneDigits.length < 11) {
                showError('phone', true); valid = false;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(inputs.email.value)) {
                showError('email', true); valid = false;
            }

            if (valid) {
                const stored = localStorage.getItem('registeredUsers');
                const users = stored ? JSON.parse(stored) : [];
                const existing = users.find(u => u.login === inputs.login.value.trim());
                if (existing) {
                    showError('login', true);
                    document.getElementById('loginError').querySelector('span').textContent = 'Этот логин уже занят';
                    showToast('Этот логин уже занят', 'error');
                    return;
                }

                const newUser = {
                    login: inputs.login.value.trim(),
                    password: inputs.password.value,
                    name: inputs.fullName.value.trim(),
                    phone: inputs.phone.value,
                    email: inputs.email.value.trim(),
                    role: 'user'
                };
                users.push(newUser);
                localStorage.setItem('registeredUsers', JSON.stringify(users));

                showToast('Регистрация прошла успешно!', 'success');
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            } else {
                showToast('Проверьте правильность заполнения полей', 'error');
            }
        });
    </script>
</body>
</html>
