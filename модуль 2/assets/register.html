<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Регистрация — Учусь.РФ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gray: #343A40;
            --light-gray: #CED4DA;
            --green: #28A745;
            --white: #FFFFFF;
            --error: #DC3545;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .logo-container {
            margin-bottom: 24px;
            text-align: center;
            animation: fadeInDown 0.6s ease;
        }

        .logo-img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 12px rgba(40, 167, 69, 0.3));
            animation: pulse 2s infinite;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-gray);
            letter-spacing: -0.5px;
        }

        .brand-subtitle {
            font-size: 12px;
            font-weight: 300;
            color: var(--light-gray);
            margin-top: 4px;
        }

        .form-card {
            background: var(--white);
            border-radius: 24px;
            padding: 32px 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(52, 58, 64, 0.08);
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .form-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-gray);
            margin-bottom: 24px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
            position: relative;
            animation: fadeInUp 0.5s ease both;
        }

        .input-group:nth-child(2) { animation-delay: 0.1s; }
        .input-group:nth-child(3) { animation-delay: 0.15s; }
        .input-group:nth-child(4) { animation-delay: 0.2s; }
        .input-group:nth-child(5) { animation-delay: 0.25s; }
        .input-group:nth-child(6) { animation-delay: 0.3s; }

        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--primary-gray);
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .input-wrapper { position: relative; }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--light-gray);
            font-size: 16px;
            transition: color 0.3s;
        }

        .form-input {
            width: 100%;
            height: 52px;
            border: 2px solid #e9ecef;
            border-radius: 14px;
            padding: 0 16px 0 44px;
            font-size: 16px;
            font-family: 'Roboto', sans-serif;
            color: var(--primary-gray);
            background: #f8f9fa;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--green);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.1);
        }

        .form-input:focus + i, .input-wrapper:focus-within i { color: var(--green); }
        .form-input.error { border-color: var(--error); animation: shake 0.4s ease; }
        .form-input.error + i { color: var(--error); }

        .error-hint {
            font-size: 11px;
            color: var(--error);
            margin-top: 4px;
            padding-left: 4px;
            display: none;
            align-items: center;
            gap: 4px;
            animation: fadeIn 0.3s ease;
        }
        .error-hint.visible { display: flex; }
        .hint-icon { font-size: 10px; }

        .btn-primary {
            width: 100%;
            height: 54px;
            background: linear-gradient(135deg, var(--green) 0%, #218838 100%);
            border: none;
            border-radius: 14px;
            color: var(--white);
            font-size: 16px;
            font-weight: 500;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 4px 16px rgba(40, 167, 69, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(40, 167, 69, 0.4);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn-primary:active::after { width: 300px; height: 300px; }

        .link-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--light-gray);
        }
        .link-text a {
            color: var(--green);
            text-decoration: none;
            font-weight: 500;
            position: relative;
        }
        .link-text a::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 2px;
            background: var(--green);
            transition: width 0.3s;
        }
        .link-text a:hover::after { width: 100%; }

        .password-strength {
            height: 4px;
            background: #e9ecef;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
            display: none;
        }
        .password-strength.visible { display: block; }
        .password-strength-bar {
            height: 100%;
            width: 0;
            border-radius: 2px;
            transition: all 0.3s;
        }
        .strength-weak { background: var(--error); width: 33%; }
        .strength-medium { background: #ffc107; width: 66%; }
        .strength-strong { background: var(--green); width: 100%; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .toast {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--primary-gray);
            color: var(--white);
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast.success { background: var(--green); }
        .toast.error { background: var(--error); }
    </style>
</head>
<body>
    <div class="toast" id="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastText">Сообщение</span>
    </div>

    <div class="logo-container">
        <img src="images/etazhi-logotip-vektor-48.jpg" alt="Учусь.РФ" class="logo-img">
        <div class="brand-name">Учусь.РФ</div>
        <div class="brand-subtitle">Запись на онлайн-курсы</div>
    </div>

    <div class="form-card">
        <h1 class="form-title">Регистрация</h1>

        <form id="registerForm">
            <div class="input-group">
                <label class="input-label">ФИО</label>
                <div class="input-wrapper">
                    <input type="text" class="form-input" id="fullName" placeholder="Иванов Иван Иванович">
                    <i class="fas fa-user"></i>
                </div>
                <div class="error-hint" id="fullNameError">
                    <i class="fas fa-exclamation-circle hint-icon"></i>
                    <span>Введите полное ФИО</span>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Логин</label>
                <div class="input-wrapper">
                    <input type="text" class="form-input" id="login" placeholder="min 6 символов, латиница и цифры">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="error-hint" id="loginError">
                    <i class="fas fa-exclamation-circle hint-icon"></i>
                    <span>Минимум 6 символов, только латиница и цифры</span>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Пароль</label>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="password" placeholder="Минимум 8 символов">
                    <i class="fas fa-lock"></i>
                </div>
                <div class="password-strength" id="passwordStrength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
                <div class="error-hint" id="passwordError">
                    <i class="fas fa-exclamation-circle hint-icon"></i>
                    <span>Пароль должен содержать минимум 8 символов</span>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Телефон</label>
                <div class="input-wrapper">
                    <input type="tel" class="form-input" id="phone" placeholder="+7 (999) 999-99-99">
                    <i class="fas fa-phone"></i>
                </div>
                <div class="error-hint" id="phoneError">
                    <i class="fas fa-exclamation-circle hint-icon"></i>
                    <span>Введите корректный номер телефона</span>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">E-mail</label>
                <div class="input-wrapper">
                    <input type="email" class="form-input" id="email" placeholder="example@mail.ru">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="error-hint" id="emailError">
                    <i class="fas fa-exclamation-circle hint-icon"></i>
                    <span>Введите корректный e-mail</span>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                <i class="fas fa-user-plus" style="margin-right: 8px;"></i>Создать аккаунт
            </button>
        </form>

        <div class="link-text">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const inputs = {
            fullName: document.getElementById('fullName'),
            login: document.getElementById('login'),
            password: document.getElementById('password'),
            phone: document.getElementById('phone'),
            email: document.getElementById('email')
        };
        const errors = {
            fullName: document.getElementById('fullNameError'),
            login: document.getElementById('loginError'),
            password: document.getElementById('passwordError'),
            phone: document.getElementById('phoneError'),
            email: document.getElementById('emailError')
        };

        function showError(field, show) {
            if (show) {
                inputs[field].classList.add('error');
                errors[field].classList.add('visible');
            } else {
                inputs[field].classList.remove('error');
                errors[field].classList.remove('visible');
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.textContent = message;
            toast.className = 'toast ' + type;
            toast.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        inputs.phone.addEventListener('input', function(e) {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 0) {
                if (val[0] === '7' || val[0] === '8') val = val.substring(1);
                let formatted = '+7';
                if (val.length > 0) formatted += ' (' + val.substring(0, 3);
                if (val.length >= 3) formatted += ') ' + val.substring(3, 6);
                if (val.length >= 6) formatted += '-' + val.substring(6, 8);
                if (val.length >= 8) formatted += '-' + val.substring(8, 10);
                e.target.value = formatted;
            }
        });

        inputs.password.addEventListener('input', function() {
            const val = this.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthDiv = document.getElementById('passwordStrength');
            if (val.length > 0) {
                strengthDiv.classList.add('visible');
                strengthBar.className = 'password-strength-bar';
                if (val.length < 6) strengthBar.classList.add('strength-weak');
                else if (val.length < 10) strengthBar.classList.add('strength-medium');
                else strengthBar.classList.add('strength-strong');
            } else {
                strengthDiv.classList.remove('visible');
            }
        });

        inputs.login.addEventListener('blur', function() {
            const regex = /^[a-zA-Z0-9]{6,}$/;
            showError('login', this.value && !regex.test(this.value));
        });
        inputs.password.addEventListener('blur', function() {
            showError('password', this.value && this.value.length < 8);
        });
        inputs.email.addEventListener('blur', function() {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            showError('email', this.value && !regex.test(this.value));
        });
        inputs.fullName.addEventListener('blur', function() {
            showError('fullName', this.value && this.value.trim().split(' ').length < 2);
        });
        inputs.phone.addEventListener('blur', function() {
            const digits = this.value.replace(/\D/g, '');
            showError('phone', this.value && digits.length < 11);
        });

        Object.keys(inputs).forEach(key => {
            inputs[key].addEventListener('input', () => showError(key, false));
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            let valid = true;

            if (!inputs.fullName.value.trim() || inputs.fullName.value.trim().split(' ').length < 2) {
                showError('fullName', true); valid = false;
            }
            const loginRegex = /^[a-zA-Z0-9]{6,}$/;
            if (!loginRegex.test(inputs.login.value)) {
                showError('login', true); valid = false;
            }
            if (inputs.password.value.length < 8) {
                showError('password', true); valid = false;
            }
            const phoneDigits = inputs.phone.value.replace(/\D/g, '');
            if (phoneDigits.length < 11) {
                showError('phone', true); valid = false;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(inputs.email.value)) {
                showError('email', true); valid = false;
            }

            if (valid) {
                const stored = localStorage.getItem('registeredUsers');
                const users = stored ? JSON.parse(stored) : [];
                const existing = users.find(u => u.login === inputs.login.value.trim());
                if (existing) {
                    showError('login', true);
                    document.getElementById('loginError').querySelector('span').textContent = 'Этот логин уже занят';
                    showToast('Этот логин уже занят', 'error');
                    return;
                }

                const newUser = {
                    login: inputs.login.value.trim(),
                    password: inputs.password.value,
                    name: inputs.fullName.value.trim(),
                    phone: inputs.phone.value,
                    email: inputs.email.value.trim(),
                    role: 'user'
                };
                users.push(newUser);
                localStorage.setItem('registeredUsers', JSON.stringify(users));

                showToast('Регистрация прошла успешно!', 'success');
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            } else {
                showToast('Проверьте правильность заполнения полей', 'error');
            }
        });
    </script>
</body>
</html>
