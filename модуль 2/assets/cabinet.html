<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Личный кабинет — Учусь.РФ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <img src="img/20220922_logo.jpg" alt="Logo" class="header-logo-img">
            <div class="header-title">Личный кабинет</div>
        </div>
        <div class="header-user">
            <div class="user-avatar" id="userAvatar">У</div>
        </div>
    </header>

    <section class="slider-section">
        <div class="slider-container">
            <div class="slider-track" id="sliderTrack">
                <div class="slide" style="background: linear-gradient(135deg, #1a237e, #0d47a1);">
                    <div class="slide-content">
                        <span class="slide-icon">📚</span>
                        <div class="slide-title">Повышение квалификации</div>
                        <div class="slide-desc">Обновление знаний для действующих специалистов</div>
                    </div>
                </div>
                <div class="slide" style="background: linear-gradient(135deg, #004d40, #00695c);">
                    <div class="slide-content">
                        <span class="slide-icon">🎓</span>
                        <div class="slide-title">Профпереподготовка</div>
                        <div class="slide-desc">Получение новой профессии и диплома</div>
                    </div>
                </div>
                <div class="slide" style="background: linear-gradient(135deg, #b71c1c, #c62828);">
                    <div class="slide-content">
                        <span class="slide-icon">🛡️</span>
                        <div class="slide-title">Охрана труда</div>
                        <div class="slide-desc">Обучение безопасным методам работы</div>
                    </div>
                </div>
                <div class="slide" style="background: linear-gradient(135deg, #1a237e, #283593);">
                    <div class="slide-content">
                        <span class="slide-icon">🏫</span>
                        <div class="slide-title">Учусь.РФ</div>
                        <div class="slide-desc">Записывайтесь на курсы онлайн</div>
                    </div>
                </div>
            </div>
            <button class="slider-btn prev" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
            <button class="slider-btn next" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="slider-dots" id="sliderDots"></div>
    </section>

    <section class="content-section">
        <div class="section-header">
            <h2 class="section-title">Мои заявки</h2>
            <button class="btn-new" onclick="location.href='booking.html'">
                <i class="fas fa-plus"></i>Новая заявка
            </button>
        </div>

        <div class="requests-list" id="requestsList"></div>
    </section>

    <div class="modal-overlay" id="reviewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Оставить отзыв</h3>
                <button class="modal-close" onclick="closeReviewModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <p style="text-align: center; color: #6c757d; font-size: 14px; margin-bottom: 16px;" id="reviewCourseName">Курс</p>
            <div class="rating-stars" id="ratingStars">
                <span class="star" data-rating="1"><i class="fas fa-star"></i></span>
                <span class="star" data-rating="2"><i class="fas fa-star"></i></span>
                <span class="star" data-rating="3"><i class="fas fa-star"></i></span>
                <span class="star" data-rating="4"><i class="fas fa-star"></i></span>
                <span class="star" data-rating="5"><i class="fas fa-star"></i></span>
            </div>
            <textarea class="review-textarea" placeholder="Расскажите о вашем опыте обучения..."></textarea>
            <button class="btn-submit-review" onclick="submitReview()">Отправить отзыв</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="location.href='cabinet.html'">
            <i class="fas fa-user"></i>
            <span>Кабинет</span>
        </button>
        <button class="nav-item" onclick="location.href='booking.html'">
            <i class="fas fa-calendar-plus"></i>
            <span>Заявка</span>
        </button>
        <button class="nav-item" onclick="location.href='login.html'">
            <i class="fas fa-sign-out-alt"></i>
            <span>Выход</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
