<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход — Учусь.РФ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Toast уведомление -->
    <div class="toast" id="toast">
        <i class="fas fa-exclamation-circle"></i>
        <span id="toastText">Ошибка</span>
    </div>

    <!-- Логотип -->
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;">
        <div class="logo-container">
            <img src="images/etazhi-logotip-vektor-48.jpg" alt="Учусь.РФ" class="logo-img">
            <div class="brand-name">Учусь.РФ</div>
            <div class="brand-subtitle">Запись на онлайн-курсы</div>
        </div>

        <div class="form-card">
            <h1 class="form-title">Вход в систему</h1>

            <div class="demo-hint">
                <strong>Демо-доступ:</strong>
                Пользователь: <b>user2026</b> / <b>password</b><br>
                Администратор: <b>Admin26</b> / <b>Demo20</b>
            </div>

            <div class="error-message" id="errorMsg">
                <i class="fas fa-exclamation-triangle"></i>
                <span>Неверный логин или пароль</span>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label class="input-label">Логин</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="login" placeholder="Введите логин">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Пароль</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="Введите пароль">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>Войти
                </button>
            </form>

            <div class="link-text">
                Ещё не зарегистрированы? <a href="register.html">Регистрация</a>
            </div>

            <div class="admin-link">
                <a href="admin.html"><i class="fas fa-shield-alt" style="margin-right: 4px;"></i>Панель администратора</a>
            </div>
        </div>
    </div>

    <script>
        const demoUsers = [
            { login: 'Admin26', password: 'Demo20', role: 'admin', name: 'Администратор' },
            { login: 'user2026', password: 'password', role: 'user', name: 'Иванов Иван Иванович' }
        ];

        function getRegisteredUsers() {
            const stored = localStorage.getItem('registeredUsers');
            return stored ? JSON.parse(stored) : [];
        }

        const form = document.getElementById('loginForm');
        const loginInput = document.getElementById('login');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toastText');

        function showToast(message, type) {
            toastText.textContent = message;
            toast.className = 'toast ' + (type || '');
            toast.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showError() {
            errorMsg.classList.add('visible');
            loginInput.classList.add('error');
            passwordInput.classList.add('error');
            showToast('Неверный логин или пароль');
            setTimeout(() => {
                loginInput.classList.remove('error');
                passwordInput.classList.remove('error');
            }, 600);
        }

        loginInput.addEventListener('input', () => {
            errorMsg.classList.remove('visible');
            loginInput.classList.remove('error');
        });
        passwordInput.addEventListener('input', () => {
            errorMsg.classList.remove('visible');
            passwordInput.classList.remove('error');
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const login = loginInput.value.trim();
            const password = passwordInput.value.trim();

            if (!login || !password) {
                showToast('Заполните все поля');
                return;
            }

            const demoUser = demoUsers.find(u => u.login === login && u.password === password);
            if (demoUser) {
                localStorage.setItem('currentUser', JSON.stringify(demoUser));
                if (demoUser.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'cabinet.html';
                }
                return;
            }

            const registeredUsers = getRegisteredUsers();
            const regUser = registeredUsers.find(u => u.login === login && u.password === password);
            if (regUser) {
                localStorage.setItem('currentUser', JSON.stringify(regUser));
                showToast('Вход выполнен успешно!', 'success');
                setTimeout(() => {
                    window.location.href = 'cabinet.html';
                }, 800);
                return;
            }

            showError();
        });
    </script>
</body>
</html>
