<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход — Учусь.РФ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toast" id="toast">
        <i class="fas fa-exclamation-circle"></i>
        <span id="toastText">Ошибка</span>
    </div>

    <div class="page-center">
        <div class="logo-container">
            <img src="img/20220922_logo.jpg" alt="Учусь.РФ" class="logo-img">
            <div class="brand-name">Учусь.РФ</div>
            <div class="brand-subtitle">Запись на онлайн-курсы</div>
        </div>

        <div class="form-card">
            <h1 class="form-title">Вход в систему</h1>

            <div class="demo-hint">
                <strong>Демо-доступ:</strong>
                Пользователь: <b>user2026</b> / <b>password</b><br>
                Администратор: <b>Admin26</b> / <b>Demo20</b>
            </div>

            <div class="error-message" id="errorMsg">
                <i class="fas fa-exclamation-triangle"></i>
                <span>Неверный логин или пароль</span>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label class="input-label">Логин</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="login" placeholder="Введите логин">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Пароль</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="Введите пароль">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>Войти
                </button>
            </form>

            <div class="link-text">
                Ещё не зарегистрированы? <a href="register.html">Регистрация</a>
            </div>

            <div class="admin-link">
                <a href="admin.html"><i class="fas fa-shield-alt" style="margin-right: 4px;"></i>Панель администратора</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
