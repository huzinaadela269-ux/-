<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель администратора — Учусь.РФ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gray: #343A40;
            --light-gray: #CED4DA;
            --green: #28A745;
            --white: #FFFFFF;
            --error: #DC3545;
            --warning: #FFC107;
            --info: #17A2B8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            padding-bottom: 20px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-gray) 0%, #495057 100%);
            padding: 20px;
            color: var(--white);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo-img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            border-radius: 10px;
            background: var(--white);
            padding: 4px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
        }

        .header-subtitle {
            font-size: 12px;
            font-weight: 300;
            opacity: 0.8;
        }

        .logout-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 16px;
            transition: all 0.3s;
        }

        .logout-btn:hover { background: rgba(255,255,255,0.25); }

        .stats-row {
            display: flex;
            gap: 10px;
        }

        .stat-card {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }

        .stat-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 300;
            opacity: 0.9;
        }

        .filters-section {
            padding: 16px 20px;
            background: var(--white);
            border-bottom: 1px solid #e9ecef;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .search-box { position: relative; margin-bottom: 12px; }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--light-gray);
            font-size: 14px;
        }

        .search-input {
            width: 100%;
            height: 44px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 0 16px 0 40px;
            font-size: 14px;
            font-family: 'Roboto', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.1);
        }

        .filter-chips {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .filter-chips::-webkit-scrollbar { display: none; }

        .filter-chip {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #e9ecef;
            background: var(--white);
            font-size: 13px;
            font-weight: 500;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            color: var(--primary-gray);
        }

        .filter-chip.active {
            background: var(--green);
            border-color: var(--green);
            color: var(--white);
        }

        .filter-chip:hover:not(.active) {
            border-color: var(--green);
            color: var(--green);
        }

        .sort-bar {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
            border-bottom: 1px solid #e9ecef;
        }

        .sort-label {
            font-size: 13px;
            color: var(--light-gray);
        }

        .sort-select {
            border: none;
            background: none;
            font-size: 13px;
            font-weight: 500;
            color: var(--primary-gray);
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            outline: none;
        }

        .requests-container { padding: 16px 20px; }

        .request-item {
            background: var(--white);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.3s;
            animation: fadeInUp 0.4s ease both;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .request-item:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        .request-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 16px 0 0 16px;
        }

        .request-item.status-new::before { background: var(--info); }
        .request-item.status-assigned::before { background: var(--warning); }
        .request-item.status-completed::before { background: var(--green); }

        .request-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .request-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar-sm {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--green), #218838);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-gray);
        }

        .user-login {
            font-size: 12px;
            color: var(--light-gray);
        }

        .request-status-badge {
            font-size: 11px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .status-new .request-status-badge {
            background: #e3f2fd;
            color: var(--info);
        }

        .status-assigned .request-status-badge {
            background: #fff8e1;
            color: #f57c00;
        }

        .status-completed .request-status-badge {
            background: #e8f5e9;
            color: var(--green);
        }

        .request-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .detail-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #6c757d;
        }

        .detail-cell i {
            width: 16px;
            text-align: center;
            color: var(--light-gray);
            font-size: 13px;
        }

        .request-actions-bar {
            display: flex;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }

        .btn-action {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            border: 2px solid;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-assign {
            border-color: var(--warning);
            background: transparent;
            color: #f57c00;
        }

        .btn-assign:hover {
            background: var(--warning);
            color: var(--primary-gray);
        }

        .btn-complete {
            border-color: var(--green);
            background: transparent;
            color: var(--green);
        }

        .btn-complete:hover {
            background: var(--green);
            color: var(--white);
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 20px;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #e9ecef;
            background: var(--white);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-gray);
            transition: all 0.3s;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--green);
            color: var(--green);
        }

        .page-btn.active {
            background: var(--green);
            border-color: var(--green);
            color: var(--white);
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active { display: flex; }

        .modal-sheet {
            background: var(--white);
            width: 100%;
            max-width: 390px;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            animation: slideUp 0.3s ease;
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--light-gray);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-gray);
            margin-bottom: 8px;
        }

        .modal-subtitle {
            font-size: 14px;
            color: var(--light-gray);
            margin-bottom: 20px;
        }

        .status-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .status-option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            border: 2px solid #e9ecef;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .status-option:hover {
            border-color: var(--green);
            background: var(--white);
        }

        .status-option.selected {
            border-color: var(--green);
            background: #e8f5e9;
        }

        .status-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .status-icon.new { background: #e3f2fd; color: var(--info); }
        .status-icon.assigned { background: #fff8e1; color: #f57c00; }
        .status-icon.completed { background: #e8f5e9; color: var(--green); }

        .status-info { flex: 1; }

        .status-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-gray);
        }

        .status-desc {
            font-size: 12px;
            color: var(--light-gray);
            margin-top: 2px;
        }

        .btn-confirm {
            width: 100%;
            height: 54px;
            background: var(--green);
            border: none;
            border-radius: 14px;
            color: var(--white);
            font-size: 16px;
            font-weight: 500;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-confirm:hover { background: #218838; }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--primary-gray);
            color: var(--white);
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { background: var(--green); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastText">Статус изменён</span>
    </div>

    <header class="header">
        <div class="header-top">
            <div class="header-brand">
                <img src="images/etazhi-logotip-vektor-48.jpg" alt="Logo" class="header-logo-img">
                <div>
                    <div class="header-title">Панель администратора</div>
                    <div class="header-subtitle">Управление заявками на курсы</div>
                </div>
            </div>
            <button class="logout-btn" onclick="location.href='login.html'">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-number" id="statNew">3</div>
                <div class="stat-label">Новые</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statAssigned">2</div>
                <div class="stat-label">Идет обучение</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statCompleted">1</div>
                <div class="stat-label">Обучение завершено</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statTotal">6</div>
                <div class="stat-label">Всего</div>
            </div>
        </div>
    </header>

    <div class="filters-section">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск по имени, логину или курсу...">
        </div>
        <div class="filter-chips">
            <button class="filter-chip active" data-filter="all">Все</button>
            <button class="filter-chip" data-filter="new">Новые</button>
            <button class="filter-chip" data-filter="assigned">Идет обучение</button>
            <button class="filter-chip" data-filter="completed">Обучение завершено</button>
        </div>
    </div>

    <div class="sort-bar">
        <span class="sort-label">Сортировка:</span>
        <select class="sort-select" id="sortSelect">
            <option value="date-desc">Сначала новые</option>
            <option value="date-asc">Сначала старые</option>
            <option value="name">По имени</option>
            <option value="course">По курсу</option>
        </select>
    </div>

    <div class="requests-container" id="requestsContainer"></div>

    <div class="pagination" id="pagination"></div>

    <div class="modal-overlay" id="statusModal">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <h3 class="modal-title">Изменить статус</h3>
            <p class="modal-subtitle" id="modalRequestInfo">Заявка №1 — Иванов И.И.</p>

            <div class="status-options">
                <div class="status-option" data-status="new" onclick="selectStatus('new')">
                    <div class="status-icon new"><i class="fas fa-inbox"></i></div>
                    <div class="status-info">
                        <div class="status-name">Новая</div>
                        <div class="status-desc">Заявка только поступила</div>
                    </div>
                </div>
                <div class="status-option" data-status="assigned" onclick="selectStatus('assigned')">
                    <div class="status-icon assigned"><i class="fas fa-graduation-cap"></i></div>
                    <div class="status-info">
                        <div class="status-name">Идет обучение</div>
                        <div class="status-desc">Обучение начато</div>
                    </div>
                </div>
                <div class="status-option" data-status="completed" onclick="selectStatus('completed')">
                    <div class="status-icon completed"><i class="fas fa-check-double"></i></div>
                    <div class="status-info">
                        <div class="status-name">Обучение завершено</div>
                        <div class="status-desc">Курс успешно пройден</div>
                    </div>
                </div>
            </div>

            <button class="btn-confirm" onclick="confirmStatusChange()">Подтвердить</button>
        </div>
    </div>

    <script>
        let requests = [
            { id: 1, name: 'Иванов Иван Иванович', login: 'ivanov_ii', course: 'Повышение квалификации', date: '15.07.2026', payment: 'Предоплата по QR', status: 'new' },
            { id: 2, name: 'Петрова Мария Сергеевна', login: 'petrova_ms', course: 'Профпереподготовка', date: '18.07.2026', payment: 'Карта МИР', status: 'new' },
            { id: 3, name: 'Сидоров Алексей Викторович', login: 'sidorov_av', course: 'Охрана труда', date: '20.07.2026', payment: 'Постоплата в офисе', status: 'new' },
            { id: 4, name: 'Козлова Елена Дмитриевна', login: 'kozlova_ed', course: 'Повышение квалификации', date: '12.07.2026', payment: 'Карта МИР', status: 'assigned' },
            { id: 5, name: 'Новиков Дмитрий Андреевич', login: 'novikov_da', course: 'Профпереподготовка', date: '20.07.2026', payment: 'Предоплата по QR', status: 'assigned' },
            { id: 6, name: 'Морозова Анна Павловна', login: 'morozova_ap', course: 'Охрана труда', date: '10.06.2026', payment: 'Постоплата в офисе', status: 'completed' }
        ];

        let currentFilter = 'all';
        let currentSort = 'date-desc';
        let currentPage = 1;
        const itemsPerPage = 4;
        let editingRequestId = null;
        let selectedNewStatus = null;

        const statusLabels = {
            new: 'Новая',
            assigned: 'Идет обучение',
            completed: 'Обучение завершено'
        };

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        }

        function filterRequests() {
            let filtered = [...requests];

            if (currentFilter !== 'all') {
                filtered = filtered.filter(r => r.status === currentFilter);
            }

            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(r => 
                    r.name.toLowerCase().includes(searchTerm) ||
                    r.login.toLowerCase().includes(searchTerm) ||
                    r.course.toLowerCase().includes(searchTerm)
                );
            }

            filtered.sort((a, b) => {
                switch(currentSort) {
                    case 'date-desc':
                        return parseDate(b.date) - parseDate(a.date);
                    case 'date-asc':
                        return parseDate(a.date) - parseDate(b.date);
                    case 'name':
                        return a.name.localeCompare(b.name);
                    case 'course':
                        return a.course.localeCompare(b.course);
                    default: return 0;
                }
            });

            return filtered;
        }

        function parseDate(dateStr) {
            const parts = dateStr.split('.');
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }

        function renderRequests() {
            const filtered = filterRequests();
            const container = document.getElementById('requestsContainer');
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const pageItems = filtered.slice(start, start + itemsPerPage);

            container.innerHTML = '';

            if (pageItems.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#CED4DA;"><i class="fas fa-inbox" style="font-size:48px;margin-bottom:12px;opacity:0.5;display:block;"></i><p>Заявки не найдены</p></div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            pageItems.forEach((req, index) => {
                const card = document.createElement('div');
                card.className = 'request-item status-' + req.status;
                card.style.animationDelay = (index * 0.1) + 's';
                card.innerHTML = `
                    <div class="request-item-header">
                        <div class="request-user">
                            <div class="user-avatar-sm">${getInitials(req.name)}</div>
                            <div class="user-info">
                                <div class="user-name">${req.name}</div>
                                <div class="user-login">@${req.login}</div>
                            </div>
                        </div>
                        <span class="request-status-badge">${statusLabels[req.status]}</span>
                    </div>
                    <div class="request-details-grid">
                        <div class="detail-cell"><i class="fas fa-graduation-cap"></i>${req.course}</div>
                        <div class="detail-cell"><i class="fas fa-calendar-alt"></i>${req.date}</div>
                        <div class="detail-cell"><i class="fas fa-credit-card"></i>${req.payment}</div>
                    </div>
                    <div class="request-actions-bar">
                        <button class="btn-action btn-assign" onclick="openStatusModal(${req.id})" ${req.status === 'assigned' ? 'disabled' : ''}>
                            <i class="fas fa-graduation-cap"></i>Начать обучение
                        </button>
                        <button class="btn-action btn-complete" onclick="openStatusModal(${req.id})" ${req.status === 'completed' ? 'disabled' : ''}>
                            <i class="fas fa-check-double"></i>Завершить
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            renderPagination(totalPages);
            updateStats();
        }

        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            html += '<button class="page-btn" onclick="changePage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '><i class="fas fa-chevron-left"></i></button>';

            for (let i = 1; i <= totalPages; i++) {
                html += '<button class="page-btn ' + (i === currentPage ? 'active' : '') + '" onclick="changePage(' + i + ')">' + i + '</button>';
            }

            html += '<button class="page-btn" onclick="changePage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages ? 'disabled' : '') + '><i class="fas fa-chevron-right"></i></button>';
            pagination.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            renderRequests();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateStats() {
            const counts = { new: 0, assigned: 0, completed: 0 };
            requests.forEach(r => counts[r.status]++);
            document.getElementById('statNew').textContent = counts.new;
            document.getElementById('statAssigned').textContent = counts.assigned;
            document.getElementById('statCompleted').textContent = counts.completed;
            document.getElementById('statTotal').textContent = requests.length;
        }

        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                currentPage = 1;
                renderRequests();
            });
        });

        document.getElementById('searchInput').addEventListener('input', function() {
            currentPage = 1;
            renderRequests();
        });

        document.getElementById('sortSelect').addEventListener('change', function() {
            currentSort = this.value;
            renderRequests();
        });

        const modal = document.getElementById('statusModal');

        function openStatusModal(requestId) {
            editingRequestId = requestId;
            const req = requests.find(r => r.id === requestId);
            document.getElementById('modalRequestInfo').textContent = 'Заявка №' + req.id + ' — ' + req.name;

            selectedNewStatus = req.status;
            document.querySelectorAll('.status-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.status === req.status);
            });

            modal.classList.add('active');
        }

        function selectStatus(status) {
            selectedNewStatus = status;
            document.querySelectorAll('.status-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.status === status);
            });
        }

        function confirmStatusChange() {
            if (!selectedNewStatus || !editingRequestId) return;

            const req = requests.find(r => r.id === editingRequestId);
            if (req) {
                req.status = selectedNewStatus;
                showToast('Статус заявки №' + req.id + ' изменён на «' + statusLabels[selectedNewStatus] + '»');
                renderRequests();
            }
            closeStatusModal();
        }

        function closeStatusModal() {
            modal.classList.remove('active');
            editingRequestId = null;
            selectedNewStatus = null;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        modal.addEventListener('click', e => {
            if (e.target === modal) closeStatusModal();
        });

        renderRequests();
    </script>
</body>
</html>
