<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель администратора — Учусь.РФ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastText">Статус изменён</span>
    </div>

    <header class="admin-header">
        <div class="admin-header-top">
            <div class="admin-brand">
                <img src="images/etazhi-logotip-vektor-48.jpg" alt="Logo" class="header-logo-img">
                <div>
                    <div class="header-title">Панель администратора</div>
                    <div class="header-subtitle">Управление заявками на курсы</div>
                </div>
            </div>
            <button class="logout-btn" onclick="location.href='login.html'">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
        <div class="admin-stats">
            <div class="admin-stat">
                <div class="admin-stat-number" id="statNew">3</div>
                <div class="admin-stat-label">Новые</div>
            </div>
            <div class="admin-stat">
                <div class="admin-stat-number" id="statAssigned">2</div>
                <div class="admin-stat-label">Идет обучение</div>
            </div>
            <div class="admin-stat">
                <div class="admin-stat-number" id="statCompleted">1</div>
                <div class="admin-stat-label">Обучение завершено</div>
            </div>
            <div class="admin-stat">
                <div class="admin-stat-number" id="statTotal">6</div>
                <div class="admin-stat-label">Всего</div>
            </div>
        </div>
    </header>

    <div class="filter-section">
        <div class="admin-search-box">
            <i class="fas fa-search"></i>
            <input type="text" class="admin-search-input" id="searchInput" placeholder="Поиск по имени, логину или курсу...">
        </div>
        <div class="admin-filter-chips">
            <button class="admin-filter-chip active" data-filter="all">Все</button>
            <button class="admin-filter-chip" data-filter="new">Новые</button>
            <button class="admin-filter-chip" data-filter="assigned">Идет обучение</button>
            <button class="admin-filter-chip" data-filter="completed">Обучение завершено</button>
        </div>
    </div>

    <div class="admin-sort-bar">
        <span class="admin-sort-label">Сортировка:</span>
        <select class="admin-sort-select" id="sortSelect">
            <option value="date-desc">Сначала новые</option>
            <option value="date-asc">Сначала старые</option>
            <option value="name">По имени</option>
            <option value="course">По курсу</option>
        </select>
    </div>

    <div class="admin-requests-container" id="requestsContainer"></div>

    <div class="admin-pagination" id="pagination"></div>

    <div class="admin-modal-overlay" id="statusModal">
        <div class="admin-modal-sheet">
            <div class="admin-modal-handle"></div>
            <h3 class="admin-modal-title">Изменить статус</h3>
            <p class="admin-modal-subtitle" id="modalRequestInfo">Заявка №1 — Иванов И.И.</p>

            <div class="admin-status-options">
                <div class="admin-status-option" data-status="new" onclick="selectStatus('new')">
                    <div class="admin-status-icon new"><i class="fas fa-inbox"></i></div>
                    <div class="status-info">
                        <div class="admin-status-name">Новая</div>
                        <div class="admin-status-desc">Заявка только поступила</div>
                    </div>
                </div>
                <div class="admin-status-option" data-status="assigned" onclick="selectStatus('assigned')">
                    <div class="admin-status-icon assigned"><i class="fas fa-graduation-cap"></i></div>
                    <div class="status-info">
                        <div class="admin-status-name">Идет обучение</div>
                        <div class="admin-status-desc">Обучение начато</div>
                    </div>
                </div>
                <div class="admin-status-option" data-status="completed" onclick="selectStatus('completed')">
                    <div class="admin-status-icon completed"><i class="fas fa-check-double"></i></div>
                    <div class="status-info">
                        <div class="admin-status-name">Обучение завершено</div>
                        <div class="admin-status-desc">Курс успешно пройден</div>
                    </div>
                </div>
            </div>

            <button class="admin-btn-confirm" onclick="confirmStatusChange()">Подтвердить</button>
        </div>
    </div>

    <script>
        let requests = [
            { id: 1, name: 'Иванов Иван Иванович', login: 'ivanov_ii', course: 'Повышение квалификации', date: '15.07.2026', payment: 'Предоплата по QR', status: 'new' },
            { id: 2, name: 'Петрова Мария Сергеевна', login: 'petrova_ms', course: 'Профпереподготовка', date: '18.07.2026', payment: 'Карта МИР', status: 'new' },
            { id: 3, name: 'Сидоров Алексей Викторович', login: 'sidorov_av', course: 'Охрана труда', date: '20.07.2026', payment: 'Постоплата в офисе', status: 'new' },
            { id: 4, name: 'Козлова Елена Дмитриевна', login: 'kozlova_ed', course: 'Повышение квалификации', date: '12.07.2026', payment: 'Карта МИР', status: 'assigned' },
            { id: 5, name: 'Новиков Дмитрий Андреевич', login: 'novikov_da', course: 'Профпереподготовка', date: '20.07.2026', payment: 'Предоплата по QR', status: 'assigned' },
            { id: 6, name: 'Морозова Анна Павловна', login: 'morozova_ap', course: 'Охрана труда', date: '10.06.2026', payment: 'Постоплата в офисе', status: 'completed' }
        ];

        let currentFilter = 'all';
        let currentSort = 'date-desc';
        let currentPage = 1;
        const itemsPerPage = 4;
        let editingRequestId = null;
        let selectedNewStatus = null;

        const statusLabels = {
            new: 'Новая',
            assigned: 'Идет обучение',
            completed: 'Обучение завершено'
        };

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        }

        function filterRequests() {
            let filtered = [...requests];

            if (currentFilter !== 'all') {
                filtered = filtered.filter(r => r.status === currentFilter);
            }

            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(r => 
                    r.name.toLowerCase().includes(searchTerm) ||
                    r.login.toLowerCase().includes(searchTerm) ||
                    r.course.toLowerCase().includes(searchTerm)
                );
            }

            filtered.sort((a, b) => {
                switch(currentSort) {
                    case 'date-desc':
                        return parseDate(b.date) - parseDate(a.date);
                    case 'date-asc':
                        return parseDate(a.date) - parseDate(b.date);
                    case 'name':
                        return a.name.localeCompare(b.name);
                    case 'course':
                        return a.course.localeCompare(b.course);
                    default: return 0;
                }
            });

            return filtered;
        }

        function parseDate(dateStr) {
            const parts = dateStr.split('.');
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }

        function renderRequests() {
            const filtered = filterRequests();
            const container = document.getElementById('requestsContainer');
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const pageItems = filtered.slice(start, start + itemsPerPage);

            container.innerHTML = '';

            if (pageItems.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#CED4DA;"><i class="fas fa-inbox" style="font-size:48px;margin-bottom:12px;opacity:0.5;display:block;"></i><p>Заявки не найдены</p></div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            pageItems.forEach((req, index) => {
                const card = document.createElement('div');
                card.className = 'admin-request-item status-' + req.status;
                card.style.animationDelay = (index * 0.1) + 's';
                card.innerHTML = `
                    <div class="admin-request-header">
                        <div class="admin-request-user">
                            <div class="admin-user-avatar">${getInitials(req.name)}</div>
                            <div>
                                <div class="admin-user-name">${req.name}</div>
                                <div class="admin-user-login">@${req.login}</div>
                            </div>
                        </div>
                        <span class="admin-request-badge">${statusLabels[req.status]}</span>
                    </div>
                    <div class="admin-request-details">
                        <div class="admin-detail-cell"><i class="fas fa-graduation-cap"></i>${req.course}</div>
                        <div class="admin-detail-cell"><i class="fas fa-calendar-alt"></i>${req.date}</div>
                        <div class="admin-detail-cell"><i class="fas fa-credit-card"></i>${req.payment}</div>
                    </div>
                    <div class="admin-request-actions">
                        <button class="admin-btn-action admin-btn-assign" onclick="openStatusModal(${req.id})" ${req.status === 'assigned' ? 'disabled' : ''}>
                            <i class="fas fa-graduation-cap"></i>Начать обучение
                        </button>
                        <button class="admin-btn-action admin-btn-complete" onclick="openStatusModal(${req.id})" ${req.status === 'completed' ? 'disabled' : ''}>
                            <i class="fas fa-check-double"></i>Завершить
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            renderPagination(totalPages);
            updateStats();
        }

        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            html += '<button class="admin-page-btn" onclick="changePage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '><i class="fas fa-chevron-left"></i></button>';

            for (let i = 1; i <= totalPages; i++) {
                html += '<button class="admin-page-btn ' + (i === currentPage ? 'active' : '') + '" onclick="changePage(' + i + ')">' + i + '</button>';
            }

            html += '<button class="admin-page-btn" onclick="changePage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages ? 'disabled' : '') + '><i class="fas fa-chevron-right"></i></button>';
            pagination.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            renderRequests();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateStats() {
            const counts = { new: 0, assigned: 0, completed: 0 };
            requests.forEach(r => counts[r.status]++);
            document.getElementById('statNew').textContent = counts.new;
            document.getElementById('statAssigned').textContent = counts.assigned;
            document.getElementById('statCompleted').textContent = counts.completed;
            document.getElementById('statTotal').textContent = requests.length;
        }

        document.querySelectorAll('.admin-filter-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.admin-filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                currentPage = 1;
                renderRequests();
            });
        });

        document.getElementById('searchInput').addEventListener('input', function() {
            currentPage = 1;
            renderRequests();
        });

        document.getElementById('sortSelect').addEventListener('change', function() {
            currentSort = this.value;
            renderRequests();
        });

        const modal = document.getElementById('statusModal');

        function openStatusModal(requestId) {
            editingRequestId = requestId;
            const req = requests.find(r => r.id === requestId);
            document.getElementById('modalRequestInfo').textContent = 'Заявка №' + req.id + ' — ' + req.name;

            selectedNewStatus = req.status;
            document.querySelectorAll('.admin-status-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.status === req.status);
            });

            modal.classList.add('active');
        }

        function selectStatus(status) {
            selectedNewStatus = status;
            document.querySelectorAll('.admin-status-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.status === status);
            });
        }

        function confirmStatusChange() {
            if (!selectedNewStatus || !editingRequestId) return;

            const req = requests.find(r => r.id === editingRequestId);
            if (req) {
                req.status = selectedNewStatus;
                showToast('Статус заявки №' + req.id + ' изменён на «' + statusLabels[selectedNewStatus] + '»');
                renderRequests();
            }
            closeStatusModal();
        }

        function closeStatusModal() {
            modal.classList.remove('active');
            editingRequestId = null;
            selectedNewStatus = null;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        modal.addEventListener('click', e => {
            if (e.target === modal) closeStatusModal();
        });

        renderRequests();
    </script>
</body>
</html>
