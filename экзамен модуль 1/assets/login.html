<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Учусь.РФ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app-header"></div>
<div class="container page-transition">
    <div class="card" style="max-width:420px; margin: 40px auto;">
        <h2>Вход в систему</h2>
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="login" placeholder="Введите ваш логин" required>
                <div class="error-text" id="err-login"></div>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Введите пароль" required>
                <div class="error-text" id="err-password"></div>
            </div>
            <button type="submit" class="btn" style="width:100%">Войти</button>
        </form>
        <div class="link-row">
            Ещё не зарегистрированы? <a href="register.html">Регистрация</a>
        </div>
    </div>
</div>
<script src="app.js"></script>
<script>
    renderHeader();
    document.getElementById('loginForm').onsubmit = e => {
        e.preventDefault();
        // Сброс ошибок
        ['login','password'].forEach(f => {
            document.getElementById(f).classList.remove('error');
            document.getElementById('err-' + f).classList.remove('visible');
        });

        const login = document.getElementById('login').value.trim();
        const password = document.getElementById('password').value;

        if (!login) {
            document.getElementById('login').classList.add('error');
            document.getElementById('err-login').textContent = 'Введите логин';
            document.getElementById('err-login').classList.add('visible');
        }
        if (!password) {
            document.getElementById('password').classList.add('error');
            document.getElementById('err-password').textContent = 'Введите пароль';
            document.getElementById('err-password').classList.add('visible');
        }
        if (!login || !password) return;

        const user = DB.getUsers().find(u => u.login === login && u.password === password);
        if (!user) {
            document.getElementById('login').classList.add('error');
            document.getElementById('password').classList.add('error');
            document.getElementById('err-login').textContent = 'Неверный логин или пароль';
            document.getElementById('err-login').classList.add('visible');
            document.getElementById('err-password').textContent = 'Неверный логин или пароль';
            document.getElementById('err-password').classList.add('visible');
            notify('Неверный логин или пароль', 'error');
            return;
        }
        DB.setCurrentUser(user);
        notify('Добро пожаловать, ' + user.fullname + '!', 'success');
        setTimeout(() => location.href = user.role === 'admin' ? 'admin.html' : 'cabinet.html', 600);
    };
</script>
</body></html>
